name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm install

      # ── Code Signing: Decode PFX จาก GitHub Secret ──────────────────────────
      - name: Decode PFX Certificate
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
        run: |
          if (-not $env:CERT_PFX_BASE64) {
            Write-Host "No CERT_PFX_BASE64 secret — skipping certificate setup"
            exit 0
          }
          $pfxDir = "$env:RUNNER_TEMP\cert"
          New-Item -ItemType Directory -Path $pfxDir -Force | Out-Null
          $pfxPath = "$pfxDir\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_PFX_BASE64))
          "CERT_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "PFX decoded OK: $pfxPath"

      # ── Tauri Build (ไม่มี auto-sign — signing ทำหลัง build ด้วย signtool) ──
      - name: Build and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'vibeKidbright v__VERSION__ (Windows)'
          releaseBody: 'ดาวน์โหลดไฟล์ .msi หรือ .exe ด้านล่างเพื่อติดตั้งบน Windows'
          releaseDraft: true
          prerelease: false

      # ── Code Signing: เซ็น installer ด้วย signtool หลัง build เสร็จ ─────────
      - name: Sign Installer Files
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_PFX_PATH) {
            Write-Host "No CERT_PFX_PATH — skipping signing"
            exit 0
          }
          if (-not (Test-Path $env:CERT_PFX_PATH)) {
            Write-Host "PFX file not found at: $env:CERT_PFX_PATH — skipping signing"
            exit 0
          }
          Write-Host "Signing with PFX: $env:CERT_PFX_PATH"
          .\scripts\sign-installer.ps1

      # ── Cleanup: ลบ PFX ชั่วคราว ─────────────────────────────────────────────
      - name: Cleanup Certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_PFX_PATH -and (Test-Path $env:CERT_PFX_PATH)) {
            Remove-Item $env:CERT_PFX_PATH -Force
            Write-Host "Certificate file removed."
          } else {
            Write-Host "No certificate file to clean up."
          }
