name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm install

      # ── อ่าน version จาก tauri.conf.json ─────────────────────────────────────
      - name: Get app version
        id: get_version
        shell: pwsh
        run: |
          $conf = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $ver = $conf.version
          Write-Host "Version: $ver"
          "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── Code Signing: Decode PFX จาก GitHub Secret ──────────────────────────
      - name: Decode PFX Certificate
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
        run: |
          if (-not $env:CERT_PFX_BASE64) {
            Write-Host "No CERT_PFX_BASE64 secret — skipping certificate setup"
            exit 0
          }
          $pfxDir = "$env:RUNNER_TEMP\cert"
          New-Item -ItemType Directory -Path $pfxDir -Force | Out-Null
          $pfxPath = "$pfxDir\codesign.pfx"
          
          # Clean up base64 string (remove newlines/spaces) before decoding
          $cleanB64 = $env:CERT_PFX_BASE64 -replace '\s',''
          $bytes = [Convert]::FromBase64String($cleanB64)
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          
          "CERT_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "PFX decoded OK: $pfxPath (Size: $(Get-Item $pfxPath).Length bytes)"

      # ── Tauri Build เท่านั้น (ไม่ upload release ในขั้นตอนนี้) ───────────────
      - name: Build Tauri App
        shell: pwsh
        run: npm run tauri build

      # ── Code Signing: เซ็น installer หลัง build เสร็จ ───────────────────────
      - name: Sign Installer Files
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_PFX_PATH) {
            Write-Host "No CERT_PFX_PATH — skipping signing"
            exit 0
          }
          if (-not (Test-Path $env:CERT_PFX_PATH)) {
            Write-Host "PFX file not found — skipping signing"
            exit 0
          }
          Write-Host "Signing with PFX: $env:CERT_PFX_PATH"
          .\scripts\sign-installer.ps1

      # ── Upload ไฟล์ที่เซ็นแล้วขึ้น GitHub Release ────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: vibeKidbright v${{ steps.get_version.outputs.version }} (Windows)
          body: ดาวน์โหลดไฟล์ .msi หรือ .exe ด้านล่างเพื่อติดตั้งบน Windows
          draft: true
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Submit to winget (รันหลังจากปล่อย Release สำเร็จ) ───────────────────
      - name: Submit to winget
        id: winget_submit
        if: steps.create_release.outcome == 'success'
        shell: pwsh
        env:
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          if (-not $env:WINGET_GITHUB_TOKEN) {
            Write-Host "No WINGET_GITHUB_TOKEN secret — skipping winget submission"
            exit 0
          }
          Write-Host "Downloading wingetcreate..."
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile "$env:TEMP\wingetcreate.exe"
          
          $version = "${{ steps.get_version.outputs.version }}"
          $url = "https://github.com/Naruebodee8/vibeKidbright-Idf/releases/download/v$version/Kidbright_IDE_${version}_x64-setup.exe"
          
          Write-Host "Submitting version $version to winget..."
          & "$env:TEMP\wingetcreate.exe" update Naruebodee8.VibeKidbrightIDE `
            --version $version `
            --urls $url `
            --token $env:WINGET_GITHUB_TOKEN `
            --submit

      # ── Cleanup: ลบ PFX ชั่วคราว ─────────────────────────────────────────────
      - name: Cleanup Certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_PFX_PATH -and (Test-Path $env:CERT_PFX_PATH)) {
            Remove-Item $env:CERT_PFX_PATH -Force
            Write-Host "Certificate file removed."
          } else {
            Write-Host "No certificate file to clean up."
          }

